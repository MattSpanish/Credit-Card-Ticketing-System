name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Updated to parse the wrapped action's output correctly:
      url: ${{ fromJSON(steps.deployment.outputs.outputs).page_url }}
    steps:
      - name: Deploy with Retry
        id: deployment
        uses: Wandalen/wretry.action@v3.5.0
        with:
          action: actions/deploy-pages@v4
          attempt_limit: 3
          attempt_delay: 120000